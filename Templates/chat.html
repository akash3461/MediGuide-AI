<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>MediGuide AI — Medical Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <main class="chatbot-container">
      <header class="chatbot-header">
        <div class="left">
          <div class="avatar">🩺</div>
          <div>
            <div class="title">MediGuide</div>
            <div class="status">Medical Assistant — Online</div>
          </div>
        </div>
        <div class="right">
          <button id="helpBtn" class="icon-btn">How it works</button>
        </div>
      </header>

      <div class="chat-window">
        <div class="chat-list" id="messages" aria-live="polite">
          <article class="message bot">
            <div class="meta"><span class="avatar-sm">🩺</span><strong>MediGuide</strong> <time>now</time></div>
            <div class="body">Hello! I'm MediGuide AI, your medical assistant. How can I help you today?</div>
          </article>
        </div>

        <div class="composer">
          <input id="userInput" name="message" type="text" autocomplete="off" placeholder="Ask a medical question..." aria-label="Message">
          <button id="sendBtn" type="button">Send</button>
        </div>
      </div>

      <footer class="footer">Powered by MediGuide • Use for informational purposes only</footer>
    </main>

    <script>
      const messagesEl = document.getElementById('messages');
      const userInput = document.getElementById('userInput');
      const sendBtn = document.getElementById('sendBtn');

      function appendMessage(text, who='bot'){
        const article = document.createElement('article');
        article.className = `message ${who}`;
        const meta = document.createElement('div');
        meta.className = 'meta';
        meta.innerHTML = `<strong>${who==='user'?'You':'MediGuide'}</strong> • <time>${new Date().toLocaleTimeString()}</time>`;
        const body = document.createElement('div');
        body.className = 'body';
        body.textContent = text;
        article.appendChild(meta);
        article.appendChild(body);
        messagesEl.appendChild(article);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function showTyping(){
        if (document.getElementById('typing')) return;
        const t = document.createElement('article');
        t.className = 'message bot typing';
        t.id = 'typing';
        const body = document.createElement('div');
        body.className = 'body typing-indicator';
        body.innerHTML = '<span></span><span></span><span></span>';
        t.appendChild(body);
        messagesEl.appendChild(t);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function hideTyping(){
        const t = document.getElementById('typing');
        if (t) t.remove();
      }

      async function sendMessage(){
        const text = userInput.value.trim();
        if (!text) return;
        appendMessage(text, 'user');
        userInput.value = '';
        showTyping();

        try{
          const res = await fetch('/chat', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({message: text})
          });
          const json = await res.json();
          hideTyping();
          if (res.ok && json.reply){
            appendMessage(json.reply, 'bot');
          } else if (json.error){
            appendMessage('Error: '+json.error, 'bot');
          } else {
            appendMessage('Unexpected response from server.', 'bot');
          }
        }catch(err){
          hideTyping();
          appendMessage('Network error — please try again.', 'bot');
          console.error(err);
        }
      }

      userInput.addEventListener('keydown', (e)=>{ if (e.key === 'Enter') sendMessage(); });
      sendBtn.addEventListener('click', sendMessage);

      // suggestion chips
      document.querySelectorAll('.suggestion').forEach(btn=>{
        btn.addEventListener('click', ()=>{
          userInput.value = btn.textContent;
          userInput.focus();
        });
      });
    </script>
  </body>
</html>
